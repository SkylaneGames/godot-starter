name: Build and Deploy

# Controls when the action will run. 
on:
  # Triggers the workflow on push but only for tags starting with "v" (i.e. v0.1)
  push:
    tags: v*

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
jobs:
  build-webgl:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v6.0.2
      
      - name: Godot - Build
        run: mkdir -p build/web && godot --headless --export-release Web ../build/web/index.html src/project.godot
      
#      - name: Create Archive
#        run: tar acvf game.zip -C build/web .

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: game_webgl
          path: ./build/web/
          retention-days: 9
  
  build-linux:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v6.0.2
      
      - name: Godot - Build
        run: mkdir -p build/linux && godot --headless --export-release Linux ../build/linux/game src/project.godot
      
#     - name: Create Archive
#        run: tar acvf game.zip -C build/linux .

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: game_linux
          path: ./build/linux
          retention-days: 9

  build-win64:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v6.0.2
      
      - name: Godot - Build
        run: mkdir -p build/windows && godot --headless --export-release Windows ../build/windows/game.exe src/project.godot
      
#      - name: Create Archive
#        run: tar acvf game.zip -C build/windows .

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: game_win64
          path: ./build/windows
          retention-days: 9

