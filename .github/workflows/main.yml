  deploy-webgl:
    runs-on: windows-latest
    needs: [build-webgl]
    name: Deploy to itch.io (Web)
    env:
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      itch_channel: ${{ secrets.ITCH_USERNAME }}/${{ secrets.ITCH_GAME_NAME }}:web
    steps:
      - name: Download Game Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: game_webgl
          path: bin
      - name: Configure Butler
        run: |
          Invoke-WebRequest -Uri https://broth.itch.zone/butler/windows-amd64/LATEST/archive/default -OutFile butler.zip
          Expand-Archive -Path butler.zip -DestinationPath .
          ./butler.exe -V
          ./butler.exe login
        shell: powershell
      - name: Push to itch.io
        run: ./butler.exe push ./bin $env:itch_channel
        shell: powershell
         
  deploy-win64:
    runs-on: windows-latest
    needs: [build-win64]
    name: Deploy to itch.io (win64)
    env:
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      itch_channel: ${{ secrets.ITCH_USERNAME }}/${{ secrets.ITCH_GAME_NAME }}:win64
    steps:
      - name: Download Game Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: game_win64
          path: bin
      - name: Configure Butler
        run: |
          Invoke-WebRequest -Uri https://broth.itch.zone/butler/windows-amd64/LATEST/archive/default -OutFile butler.zip
          Expand-Archive -Path butler.zip -DestinationPath .
          ./butler.exe -V
          ./butler.exe login
        shell: powershell
      - name: Push to itch.io
        run: ./butler.exe push ./bin $env:itch_channel
        shell: powershell
         
